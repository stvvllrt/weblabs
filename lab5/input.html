<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>
    <link rel="stylesheet" href="input.css">
</head>
<body>
<div class="container">
    <div class="text-row">
        <label>
            Inputs<br>
            <input type="text" placeholder="enter text" name="text">
            <input type="text" placeholder="enter text" name="text" pattern="valid">
            <input type="text" placeholder="enter text" name="text" pattern="valid">
        </label>
    </div>
    <div class="toggle-row">
        <label>
            Checkboxes<br>
            <div class="toggle-container">
                <input type="checkbox" id="sub-green" class="toggle-input green" checked>
                <label for="sub-green" class="toggle-label">Subscribe</label>
                <div class="space"></div>
                <input type="checkbox" id="sub-red" class="toggle-input red" checked>
                <label for="sub-red" class="toggle-label">Subscribe</label>
            </div>
        </label>
    </div>
    <div class="radio-row">
        <label>
            Radio-buttons<br>
            Gender:
            <input type="radio" name="radio" id="radio-1" class="radio-input">
            <label for="radio-1">Female</label>
            <input type="radio" name="radio" id="radio-2" class="radio-input">
            <label for="radio-2">Male</label>
        </label>
    </div>
    <div class="buttons-row">
        <label>
            Buttons<br>
            <input type="button" value="active">
            <input type="button" value="hover1">
            <input type="button" value="danger">
            <input type="button" value="hover2">
            <input type="button"  value="disabled" disabled>
            <input type="button" value="+">
            <input type="button" value="-">
        </label>
    </div>
    <div class="text-input-row">
        <label>
            Text box<br>
            <textarea rows="5" cols="50"></textarea>
        </label>
    </div>
</div>
</body>
