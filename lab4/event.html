<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event</title>
    <link rel="stylesheet" href="event.css">
</head>
<body>
    <header class="event-header">
        <nav class="navpath">
            Home / Articles /
        </nav>
        <h1 class="event-title">
            The Difference Between <br>
            Responsive and <br>
            Adaptive Design
        </h1>
        <div class="meta-container">
            <div class="author-avatar">
                <img src="media/profile_picture.png" alt="Geoff Graham">
            </div>

            <div class="meta-info">
                <div class="meta-item author">
                    <span class="label">Author</span>
                    <span class="value">Geoff Graham</span>
                </div>
                <div class="meta-item comments">
                    <span class="label">49 Comments</span>
                    <span class="value">Go to comments</span>
                </div>
                <div class="meta-item published">
                    <span class="label">Published</span>
                    <span class="value">Nov 11, 2018</span>
                </div>
                <div class="meta-item updated">
                    <span class="label">Updated</span>
                    <span class="value">Nov 17, 2018</span>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
