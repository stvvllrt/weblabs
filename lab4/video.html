<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка видео</title>
    <link rel="stylesheet" href="video.css">
</head>
<body>
    <div class="upload-container">
        <div class="video-preview">
            <div class="image-placeholder">
                <img src="https://img.icons8.com/ios-filled/100/666666/refresh.png" alt="Loading icon">
            </div>
        </div>

        <div class="upload-details">
            <div class="progress-bar">
                <div class="progress-fill">UPLOADING 40%</div>
                <div class="progress-text">About 23 minutes remaining</div>
            </div>

            <h2 class="video-title">Title of video</h2>
            <p class="warning-text">* Your video is still uploading. Please keep this page open until it's done.</p>
        </div>

        <div class="action-button">
            <button class="done-btn" disabled>DONE</button>
        </div>
    </div>
</body>
</html>
